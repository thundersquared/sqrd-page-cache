name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Get version from tag
        id: tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION"                              >> $GITHUB_OUTPUT
          echo "zip_name=sqrd-page-cache-${VERSION}.zip"      >> $GITHUB_OUTPUT

      - name: Stamp version into plugin file
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          sed -i "s/^ \* Version:.*/ * Version:           ${VERSION}/" sqrd-page-cache.php
          sed -i "s/define('SQRD_CACHE_VERSION', '[^']*')/define('SQRD_CACHE_VERSION', '${VERSION}')/" sqrd-page-cache.php

      - name: Install dependencies (with dev, for tests)
        uses: php-actions/composer@v6.1.2
        with:
          php_version: "8.3"
          dev: yes

      - name: Run Pest test suite
        uses: php-actions/phpunit@v4
        with:
          php_version: "8.3"
          vendored_phpunit_path: vendor/bin/pest
          args: --no-coverage

      - name: Reinstall dependencies (no dev, for release)
        uses: php-actions/composer@v6.1.2
        with:
          php_version: "8.3"
          dev: no
          args: --optimize-autoloader

      - name: Build plugin zip
        run: |
          mkdir -p /tmp/dist/sqrd-page-cache

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='.gitignore' \
            --exclude='.distignore' \
            --exclude='*.zip' \
            . /tmp/dist/sqrd-page-cache/

          cd /tmp/dist
          zip -r "${{ steps.tag.outputs.zip_name }}" sqrd-page-cache/
          echo "Built: $(du -sh ${{ steps.tag.outputs.zip_name }})"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: "${{ github.ref_name }}"
          generate_release_notes: true
          files: /tmp/dist/${{ steps.tag.outputs.zip_name }}
