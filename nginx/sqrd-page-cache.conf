# ------------------------------------------------------------
# sqrd-page-cache — vhost-scoped nginx include
#
# Place this inside your WordPress server { } block, ABOVE the
# `location /` block. No http { } level changes are required.
#
# After including this file, update your location / block to:
#
#   location / {
#       try_files $sqrd_cache_file $uri $uri/ /index.php?$args;
#   }
#
# See nginx/example-server.conf for a full annotated example.
# ------------------------------------------------------------


# ── MIME types ────────────────────────────────────────────────────────────────
# Override mime.types just for this vhost so .md files are served as
# text/markdown instead of application/octet-stream.
# Both text/html and text/markdown are listed explicitly; all other types
# continue to be resolved by the inherited http-level mime.types.
types {
    text/html     html htm shtml;
    text/markdown md;
}


# ── Accept header → cache variant ────────────────────────────────────────────
# Simple substring match — no q-value parsing.
# MUST mirror sqrd\Cache\Negotiation::ext_for_accept() in PHP exactly.
# If you change one, change both.
set $sqrd_cache_ext "html";
if ($http_accept ~* "text/markdown") {
    set $sqrd_cache_ext "md";
}


# ── URI normalisation ─────────────────────────────────────────────────────────
# Force a trailing slash so /about and /about/ resolve to the same cache file.
# PHP's Paths::normalize_uri() applies the identical rule.
set $sqrd_uri $uri;
if ($sqrd_uri !~ "/$") {
    set $sqrd_uri "${uri}/";
}


# ── Cache file path ───────────────────────────────────────────────────────────
# Build the candidate path for try_files.  When any bypass condition below
# matches, $sqrd_cache_file is redirected to a sentinel path that doesn't
# exist on disk — try_files then falls through harmlessly to PHP.
set $sqrd_cache_file "/wp-content/cache/sqrd-page-cache/$host${sqrd_uri}index.$sqrd_cache_ext";


# ── Bypass conditions ─────────────────────────────────────────────────────────
# Non-GET / non-HEAD methods must never hit the static cache.
if ($request_method !~ ^(GET|HEAD)$) {
    set $sqrd_cache_file "/sqrd-bypass";
}

# Any query string bypasses the cache.  If you want to strip tracking parameters
# (utm_*, fbclid, etc.) and still cache, do it upstream before this include,
# e.g. by rewriting $args to "" for known-safe params.
if ($args) {
    set $sqrd_cache_file "/sqrd-bypass";
}

# Logged-in users, commenters, and password-protected posts bypass the cache.
# Extend this regex with app-specific cookies as needed:
#   woocommerce_items_in_cart, edd_items_in_cart, etc.
if ($http_cookie ~* "(wordpress_logged_in_|wp-postpass_|comment_author_)") {
    set $sqrd_cache_file "/sqrd-bypass";
}


# ── Response headers ──────────────────────────────────────────────────────────
# Vary: Accept must appear on every response — both cache HITs served by nginx
# and cache MISSes served by PHP — so downstream caches (CDNs, browser) store
# and replay the correct variant.
add_header Vary "Accept" always;

# Diagnostic header: reveals which variant was selected (html or md).
# Remove in production if you prefer not to expose this.
add_header X-Sqrd-Cache "$sqrd_cache_ext" always;


# ── Pre-compressed serving ────────────────────────────────────────────────────
# nginx looks for index.html.gz / index.md.gz alongside the plain file and
# serves it automatically to clients that send Accept-Encoding: gzip.
# The plugin writes these siblings when "Pre-compress" is enabled in settings.
gzip_static on;
gzip_vary   on;


# ── Block direct access to cache files ───────────────────────────────────────
# The cache directory and .headers sidecar files must never be reachable via
# a direct HTTP request — only via nginx-internal try_files resolution.
location ^~ /wp-content/cache/sqrd-page-cache/ {
    internal;
}
location ~* "\.headers$" {
    return 404;
}
