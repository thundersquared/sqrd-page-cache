# ------------------------------------------------------------
# sqrd-page-cache — full annotated example server { } block
#
# This file shows a typical WordPress + php-fpm nginx setup
# with sqrd-page-cache wired in.  It is NOT meant to be used
# as-is; adapt it to your existing vhost configuration.
# ------------------------------------------------------------

server {
    listen 443 ssl http2;
    server_name example.com www.example.com;

    root /var/www/html;
    index index.php;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;


    # ── sqrd-page-cache ───────────────────────────────────────────────────────
    # Include this BEFORE the location / block so that $sqrd_cache_file,
    # $sqrd_cache_ext, and the types{} override are all set before location
    # matching begins.
    include /var/www/html/wp-content/plugins/sqrd-page-cache/nginx/sqrd-page-cache.conf;


    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|otf|mp4|webm|ogg|ogv)$ {
        expires     1y;
        access_log  off;
        add_header  Cache-Control "public, immutable";
    }


    # ── WordPress permalink routing ────────────────────────────────────────────
    # The only change from a stock WordPress nginx config is adding
    # $sqrd_cache_file as the first argument to try_files.
    # When $sqrd_cache_file is a real file on disk, nginx serves it directly
    # without touching PHP.  When it's the /sqrd-bypass sentinel (or the file
    # simply doesn't exist yet), try_files falls through to WordPress normally.
    location / {
        try_files $sqrd_cache_file $uri $uri/ /index.php?$args;
    }


    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Prevent FastCGI from caching; sqrd-page-cache handles that.
        fastcgi_cache_bypass 1;
        fastcgi_no_cache     1;
    }


    # ── Security ──────────────────────────────────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\. {
        deny all;
    }

    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name example.com www.example.com;
    return 301 https://example.com$request_uri;
}
